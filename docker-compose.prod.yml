version: '3.8'

services:

  # ─── Java Web App (Tomcat) ───────────────────────────────────
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-webapp
    expose:
      - "8080"
    env_file:
      - .env.production
    restart: unless-stopped
    networks:
      - restaurant-network

  # ─── Nginx Reverse Proxy + SSL ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: restaurant-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - webapp
    restart: unless-stopped
    networks:
      - restaurant-network

networks:
  restaurant-network:
    driver: bridge
